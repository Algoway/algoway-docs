backend:
  name: github
  repo: Algoway/algoway-docs
  branch: main
  base_url: https://docs.algoway.trade
  auth_endpoint: auth

media_folder: "static/img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "docs"
    label: "Docs"
    folder: "docs"
    create: true
    extension: "mdx"
    format: "frontmatter"
    nested:
      depth: 5
      summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Sidebar Label", name: "sidebar_label", widget: "string", required: false }
      - { label: "Pagination Label", name: "pagination_label", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Hide Table of Contents", name: "hide_table_of_contents", widget: "boolean", required: false, default: true }
      - { label: "Body", name: "body", widget: "markdown" }
